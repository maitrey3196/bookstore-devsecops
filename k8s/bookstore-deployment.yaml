apiVersion: apps/v1
kind: Deployment
metadata:
  name: bookstore
spec:
  replicas: 1

  selector:
    matchLabels:
      app: bookstore

  template:
    metadata:
      labels:
        app: bookstore

    spec:
      containers:
      - name: bookstore

        image: bookstore:1.0

        imagePullPolicy: Never

        ports:
        - containerPort: 3000
