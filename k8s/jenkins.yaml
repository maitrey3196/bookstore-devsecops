apiVersion: v1
kind: Namespace
metadata:
  name: jenkins

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jenkins-pvc
  namespace: jenkins
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jenkins
  namespace: jenkins

spec:
  replicas: 1

  selector:
    matchLabels:
      app: jenkins

  template:
    metadata:
      labels:
        app: jenkins

    spec:
      securityContext:
        runAsUser: 0

      containers:
      - name: jenkins

        image: jenkins-devsecops:latest
        imagePullPolicy: Never

        env:
        - name: JAVA_OPTS
          value: "-Djenkins.install.runSetupWizard=false"

        ports:
        - containerPort: 8080

        volumeMounts:
        - name: jenkins-home
          mountPath: /var/jenkins_home

        - name: docker-sock
          mountPath: /var/run/docker.sock

      volumes:
      - name: jenkins-home
        persistentVolumeClaim:
          claimName: jenkins-pvc

      - name: docker-sock
        hostPath:
          path: /var/run/docker.sock
          type: Socket

---
apiVersion: v1
kind: Service
metadata:
  name: jenkins
  namespace: jenkins

spec:
  type: NodePort

  selector:
    app: jenkins

  ports:
  - port: 8080
    targetPort: 8080
    nodePort: 30080
