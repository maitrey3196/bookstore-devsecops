apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sonarqube-pvc
  namespace: sonarqube
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sonarqube
  namespace: sonarqube
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sonarqube

  template:
    metadata:
      labels:
        app: sonarqube

    spec:
      containers:
      - name: sonarqube
        image: sonarqube:lts-community

        ports:
        - containerPort: 9000

        volumeMounts:
        - name: sonarqube-data
          mountPath: /opt/sonarqube/data

      volumes:
      - name: sonarqube-data
        persistentVolumeClaim:
          claimName: sonarqube-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: sonarqube
  namespace: sonarqube
spec:
  type: NodePort

  selector:
    app: sonarqube

  ports:
  - port: 9000
    targetPort: 9000
    nodePort: 30900
